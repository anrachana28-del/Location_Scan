<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Auto Lens FREE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#0f172a; color:white; }
.container { max-width:900px; margin:auto; padding:20px; }
#map { height:500px; margin-top:10px; border-radius:10px; }
.card { background:#1e293b; padding:10px; border-radius:10px; }
button { padding:10px; border-radius:8px; }
</style>
</head>

<body>

<div class="container">

<h2>📍 AI AUTO PIN LENS (FREE)</h2>

<input type="file" id="img">
<button onclick="scan()">Scan Image</button>

<div class="card">
<pre id="out">Result...</pre>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([11.55,104.92], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker;

async function scan() {

  let file = document.getElementById("img").files[0];

  let form = new FormData();
  form.append("image", file);

  let res = await fetch("/upload", {
    method: "POST",
    body: form
  });

  let data = await res.json();

  document.getElementById("out").innerText = JSON.stringify(data, null, 2);

  if (data.lat && data.lng) {

    map.setView([data.lat, data.lng], 16);

    if (marker) map.removeLayer(marker);

    marker = L.marker([data.lat, data.lng])
      .addTo(map)
      .bindPopup("📍 " + data.place)
      .openPopup();
  }
}

</script>

</body>
</html>
