<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Map Lens BEST</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

#map{
  height:500px;
  margin-top:15px;
  border-radius:12px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>📍 AI Map Lens BEST</h1>

<input type="file" id="img">
<button onclick="scan()">Scan Image</button>

<div class="card">
<pre id="out">Result...</pre>
</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([11.55,104.92], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let marker;

async function scan(){

  let file = document.getElementById("img").files[0];

  let form = new FormData();
  form.append("image", file);

  let res = await fetch("/upload",{
    method:"POST",
    body:form
  });

  let data = await res.json();

  document.getElementById("out")
  .innerText = JSON.stringify(data,null,2);

  if(data.lat && data.lng){

    map.setView([data.lat,data.lng],15);

    if(marker) map.removeLayer(marker);

    marker = L.marker([data.lat,data.lng])
    .addTo(map)
    .bindPopup(`
      <b>${data.place}</b><br>
      ${data.address}
    `)
    .openPopup();
  }
}
</script>

</body>
</html>
